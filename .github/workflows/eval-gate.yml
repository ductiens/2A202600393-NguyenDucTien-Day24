name: RAG Eval Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Phase A artifacts
        run: python scripts/build_phase_a.py

      - name: Run RAGAS threshold gate
        run: >
          python scripts/run_eval_gate.py
          --threshold faithfulness=0.85 answer_relevancy=0.80 context_precision=0.70 context_recall=0.75

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: |
            phase-a/ragas_results.csv
            phase-a/ragas_summary.json

